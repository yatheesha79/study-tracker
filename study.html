<!DOCTYPE html>
<html>
<head>
<title>Smart Study Planner</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    width: 90%;
    max-width: 400px;
    margin: auto;
}

.box {
    background: #1e293b;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
}

input, button {
    margin: 8px;
    padding: 8px;
    width: 85%;
    border-radius: 5px;
    border: none;
}

button {
    background: #22c55e;
    color: white;
    cursor: pointer;
}

.subject {
    background: #334155;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.tasks {
    display: none;
    margin-top: 10px;
}

.task {
    display: flex;
    justify-content: space-between;
    margin: 5px 0;
}

.done {
    text-decoration: line-through;
    opacity: 0.6;
}
</style>
</head>

<body>

<h1>📚 Smart Study Planner</h1>
<p>Stay consistent 💪</p>

<div class="container">

<div class="box">
    <input type="text" id="subject" placeholder="Enter Subject">
    <input type="date" id="date">
    <button onclick="addSubject()">Add Subject</button>
</div>

<div id="result"></div>

</div>

<script>
let subjects = JSON.parse(localStorage.getItem("subjects")) || [];

function saveData() {
    localStorage.setItem("subjects", JSON.stringify(subjects));
}

function addSubject() {
    let sub = document.getElementById("subject").value;
    let date = document.getElementById("date").value;

    if(sub && date) {
        let existing = subjects.find(s => s.sub.toLowerCase() === sub.toLowerCase());

        if(existing) {
            existing.date = date;
            alert("Subject updated!");
        } else {
            subjects.push({sub, date, done: []});
        }

        saveData();
        render();
    }
}

function toggleTasks(id) {
    let el = document.getElementById("tasks-" + id);
    el.style.display = el.style.display === "none" ? "block" : "none";
}

function render() {
    let output = "";
    let today = new Date();

    subjects.forEach((s, index) => {
        let examDate = new Date(s.date);
        let totalDays = Math.ceil((examDate - today) / (1000 * 60 * 60 * 24));

        output += `
        <div class="subject" onclick="toggleTasks(${index})">
            📘 ${s.sub}
        </div>

        <div class="tasks" id="tasks-${index}">
        `;

        if(totalDays > 0) {
            for(let i = 1; i <= totalDays; i++) {
                let isDone = s.done.includes(i);

                output += `
                <div class="task ${isDone ? 'done' : ''}">
                    Day ${i}
                    <button onclick="markDone(${index}, ${i}); event.stopPropagation();">
                        ${isDone ? '✔' : 'Done'}
                    </button>
                </div>
                `;
            }
        } else {
            output += `<p>Exam Over</p>`;
        }

        output += `</div>`;
    });

    document.getElementById("result").innerHTML = output;
}

function markDone(index, day) {
    if(!subjects[index].done.includes(day)) {
        subjects[index].done.push(day);
    }

    let examDate = new Date(subjects[index].date);
    let today = new Date();
    let totalDays = Math.ceil((examDate - today) / (1000 * 60 * 60 * 24));

    if(subjects[index].done.length >= totalDays) {
        let confirmDelete = confirm("All tasks completed! Remove this subject?");

        if(confirmDelete) {
            subjects.splice(index, 1);
        }
    }

    saveData();
    render();
}

window.onload = render;
</script>

</body>
</html>
